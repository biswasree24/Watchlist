<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Watchlist App</title>

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== BACKGROUND ORBS ========== -->
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>

  <!-- ========== MAIN WRAPPER ========== -->
  <div class="app-shell">

    <!-- ===== HEADER ===== -->
    <header class="site-header">
      <div class="header-left">
        <!-- App logo / icon -->
        <div class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="36" rx="10" fill="url(#grad)"/>
            <path d="M10 14h16M10 18h10M10 22h13" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
            <circle cx="26" cy="22" r="4" fill="#a78bfa" stroke="#fff" stroke-width="1.5"/>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="36" y2="36">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1 class="app-title">My Watchlist</h1>
          <p class="app-subtitle">Track movies &amp; anime you love</p>
        </div>
      </div>

      <div class="header-right">
        <!-- Item counter badge -->
        <div class="counter-badge" id="counterBadge" aria-label="Total items">
          <span id="itemCount">0</span>
          <span class="counter-label">titles</span>
        </div>

        <!-- Dark / Light mode toggle -->
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode" title="Toggle theme">
          <span class="toggle-icon" id="themeIcon">🌙</span>
        </button>
      </div>
    </header>

    <!-- ===== ADD / EDIT FORM CARD ===== -->
    <section class="glass-card form-card" aria-label="Add or edit a watchlist item">
      <h2 class="form-heading" id="formHeading">Add New Title</h2>

      <div class="form-body">
        <!-- Title input -->
        <div class="input-group">
          <label for="titleInput" class="input-label">Title</label>
          <input
            type="text"
            id="titleInput"
            class="text-input"
            placeholder="e.g. Attack on Titan"
            maxlength="80"
            autocomplete="off"
          />
          <span class="input-error" id="titleError" role="alert"></span>
        </div>

        <!-- Category select -->
        <div class="input-group">
          <label for="categorySelect" class="input-label">Category</label>
          <div class="select-wrapper">
            <select id="categorySelect" class="text-input select-input" aria-label="Category">
              <option value="Movie">🎬 Movie</option>
              <option value="Anime">⛩️ Anime</option>
              <option value="Series">📺 Series</option>
              <option value="Documentary">🎥 Documentary</option>
            </select>
          </div>
        </div>

        <!-- Status select -->
        <div class="input-group">
          <label for="statusSelect" class="input-label">Status</label>
          <div class="select-wrapper">
            <select id="statusSelect" class="text-input select-input" aria-label="Status">
              <option value="Plan to Watch">Plan to Watch</option>
              <option value="Watching">Watching</option>
              <option value="Completed">Completed</option>
              <option value="Dropped">Dropped</option>
            </select>
          </div>
        </div>

        <!-- Rating input -->
        <div class="input-group">
          <label for="ratingInput" class="input-label">Rating (1–10)</label>
          <input
            type="number"
            id="ratingInput"
            class="text-input"
            placeholder="8"
            min="1"
            max="10"
          />
          <span class="input-error" id="ratingError" role="alert"></span>
        </div>
      </div>

      <!-- Form action buttons -->
      <div class="form-actions">
        <button class="btn btn-primary" id="submitBtn">
          <span class="btn-glow"></span>
          <span class="btn-text">✦ Add to Watchlist</span>
        </button>
        <button class="btn btn-ghost" id="cancelBtn" style="display:none;">
          Cancel
        </button>
      </div>
    </section>

    <!-- ===== SEARCH & FILTER BAR ===== -->
    <div class="controls-bar glass-card">
      <!-- Search -->
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.8"/>
          <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input
          type="search"
          id="searchInput"
          class="text-input search-input"
          placeholder="Search titles…"
          aria-label="Search watchlist"
          autocomplete="off"
        />
      </div>

      <!-- Category filter pills -->
      <div class="filter-pills" role="group" aria-label="Filter by category">
        <button class="pill active" data-filter="All">All</button>
        <button class="pill" data-filter="Movie">Movie</button>
        <button class="pill" data-filter="Anime">Anime</button>
        <button class="pill" data-filter="Series">Series</button>
        <button class="pill" data-filter="Documentary">Documentary</button>
      </div>
    </div>

    <!-- ===== LIST AREA ===== -->
    <main class="list-area" aria-live="polite" aria-label="Watchlist items">
      <!-- Cards are injected here by script.js -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon" aria-hidden="true">🎞️</div>
        <p class="empty-title">Your watchlist is empty</p>
        <p class="empty-sub">Add a movie or anime above to get started.</p>
      </div>
    </main>

  </div><!-- /.app-shell -->

  <!-- ========== DELETE CONFIRM MODAL ========== -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-box glass-card">
      <h3 class="modal-title" id="modalTitle">Delete this title?</h3>
      <p class="modal-body" id="modalBody">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirmDeleteBtn">Yes, Delete</button>
        <button class="btn btn-ghost" id="cancelDeleteBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ========== TOAST NOTIFICATION ========== -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
